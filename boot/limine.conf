# limine.conf — Limine boot configuration for ScrapOS.
#
# This file is read by the Limine bootloader at boot. It defines the boot-menu
# entries and how to load each one. Limine searches for it at a few well-known
# locations on the boot media; we install it at /boot/limine/limine.conf.

# Seconds the boot menu waits before auto-booting the first entry. 0 = boot
# immediately (we have only one entry and want a fast dev loop).
timeout: 0

# A boot-menu entry. Lines starting with '/' name an entry.
/ScrapOS
    # Use the Limine boot protocol (hands us a 64-bit higher-half kernel with a
    # framebuffer and memory map already set up).
    protocol: limine

    # Path to the kernel on the boot media. "boot():/" is the partition this
    # config lives on; the kernel is staged at /boot/kernel on the ISO.
    path: boot():/boot/kernel
